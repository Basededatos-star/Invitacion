<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación de Alessandra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="invitacion-container">
        <!-- Imagen de la invitación -->
        <img src="invitacion.png" alt="Invitación Alessandra" class="invitacion-img">
        
        <!-- Contenedor del botón ajustado con precisión debajo de UBICACIÓN -->
        <div class="contenedor-boton">
            <a href="https://www.google.com/maps/search/?api=1&query=14.641694,-90.503917" target="_blank" class="btn-como-llegar">
                📍 Cómo llegar
            </a>
        </div>
    </div>

    <!-- REPRODUCTOR DE YOUTUBE OCULTO (Música de Cumpleaños Feliz) -->
    <iframe id="musica-fondo" 
            src="https://www.youtube.com/embed/3k53XKibh5c?enablejsapi=1&loop=1&playlist=3k53XKibh5c" 
            allow="autoplay" 
            style="display: none;">
    </iframe>

    <!-- SCRIPT PARA EMPEZAR LA MÚSICA CON EL PRIMER TOQUE -->
    <script>
        document.addEventListener('click', function() {
            var iframe = document.getElementById('musica-fondo');
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }, { once: true });

        // También funciona si arrastran el dedo para hacer scroll en el teléfono
        document.addEventListener('touchstart', function() {
            var iframe = document.getElementById('musica-fondo');
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }, { once: true });
    </script>

</body>
</html>
